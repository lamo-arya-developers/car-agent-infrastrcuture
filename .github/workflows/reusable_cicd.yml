name: Terraform Reusable
on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      OIDC_ROLE_ARN:
        required: true

jobs:
  terraform:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply ECR
        id: ecr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/terraform-apply-ecr
        with:
          environment: ${{ inputs.environment }}

      - name: Push placeholder image to Lambda ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/push-placeholder-image
        with:
          ecr_url: ${{ steps.ecr.outputs.ecr_lambda_url }}

      - name: Push placeholder image to AgentCore ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/push-placeholder-image
        with:
          ecr_url: ${{ steps.ecr.outputs.ecr_agentcore_url }}

      - name: Terraform Plan
        run: terraform plan -var-file="${{ inputs.environment }}.tfvars"

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file="${{ inputs.environment }}.tfvars"