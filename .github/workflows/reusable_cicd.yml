name: Terraform Reusable
on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      OIDC_ROLE_ARN:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
      # FACEBOOK_APP_ID:
      #   required: true
      # FACEBOOK_APP_SECRET:
      #   required: true

jobs:
  terraform:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        uses: ./.github/actions/terraform-plan
        with:
          environment: ${{ inputs.environment }}
          google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }}         --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---

      - name: Terraform Apply ECR
        id: ecr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/terraform-apply-ecr
        with:
          environment: ${{ inputs.environment }}
          google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }}         --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---

      - name: Push placeholder image to Orchestrator Lambda ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/push-placeholder-image
        with:
          ecr_url: ${{ steps.ecr.outputs.ecr_orchestrator_lambda_url }}

      - name: Push placeholder image to Auth Lambda ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/push-placeholder-image
        with:
          ecr_url: ${{ steps.ecr.outputs.ecr_auth_lambda_url }}

      - name: Push placeholder image to AgentCore ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/push-placeholder-image
        with:
          ecr_url: ${{ steps.ecr.outputs.ecr_agentcore_url }}

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # TF_VAR_facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # TF_VAR_facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
        run: |
          terraform apply -auto-approve \
            -target=module.s3 \
            -target=module.dynamodb \
            -target=module.cloudwatch \
            -target=module.cognito \
            -target=module.iam_lambda \
            -target=module.orchestrator_lambda \
            -target=module.auth_lambda \
            -target=module.api_gateway \
            -var-file="${{ inputs.environment }}.tfvars"