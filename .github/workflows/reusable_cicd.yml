name: Terraform Reusable
on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      OIDC_ROLE_ARN:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
      # FACEBOOK_APP_ID:
      #   required: true
      # FACEBOOK_APP_SECRET:
      #   required: true

jobs:
  # ─── Job 1: plan + apply ECR repos ────────────────────────────────────────
  terraform-ecr:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    permissions:
      id-token: write
      contents: read
    outputs:
      ecr_orchestrator_lambda_url: ${{ steps.apply-ecr.outputs.ecr_orchestrator_lambda_url }}
      ecr_auth_lambda_url:         ${{ steps.apply-ecr.outputs.ecr_auth_lambda_url }}
      ecr_agentcore_url:           ${{ steps.apply-ecr.outputs.ecr_agentcore_url }}
      ecr_deletion_lambda_url:     ${{ steps.apply-ecr.outputs.ecr_deletion_lambda_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        uses: ./.github/actions/terraform-plan
        with:
          environment: ${{ inputs.environment }}
          google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }}         --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---

      - name: Terraform Apply ECR
        id: apply-ecr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./.github/actions/terraform-apply-ecr
        with:
          environment: ${{ inputs.environment }}
          google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }}         --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---

  # ─── Job 2: push placeholder images in parallel (matrix) ──────────────────
  push-images:
    needs: terraform-ecr
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        include:
          - name: orchestrator-lambda
            ecr_url: ${{ needs.terraform-ecr.outputs.ecr_orchestrator_lambda_url }}
            platform: linux/amd64
          - name: auth-lambda
            ecr_url: ${{ needs.terraform-ecr.outputs.ecr_auth_lambda_url }}
            platform: linux/amd64
          - name: agentcore
            ecr_url: ${{ needs.terraform-ecr.outputs.ecr_agentcore_url }}
            platform: linux/arm64
          - name: deletion-lambda
            ecr_url: ${{ needs.terraform-ecr.outputs.ecr_deletion_lambda_url }}
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Push placeholder image to ${{ matrix.name }} ECR
        uses: ./.github/actions/push-placeholder-image
        with:
          ecr_url: ${{ matrix.ecr_url }}
          platform: ${{ matrix.platform }}

  # ─── Job 3: apply remaining resources + deploy frontend ───────────────────
  terraform-remaining:
    needs: push-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.14.0"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply Remaining Resources
        id: apply-remaining
        env:
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # TF_VAR_facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # TF_VAR_facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
        run: |
          terraform apply -auto-approve \
            -target=module.s3 \
            -target=module.dynamodb_car \
            -target=module.dynamodb_user \
            -target=module.cloudwatch \
            -target=module.cognito \
            -target=module.iam_lambda \
            -target=module.orchestrator_lambda \
            -target=module.auth_lambda \
            -target=module.api_gateway \
            -target=module.iam_agentcore \
            -target=module.agentcore \
            -target=module.deletion_lambda \
            -target=module.cloudtrail \
            -var-file="${{ inputs.environment }}.tfvars"
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
