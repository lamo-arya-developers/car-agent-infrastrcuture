name: Push Placeholder Image
description: Pushes a placeholder image to an ECR repository. Replaces the existing image if tagged latest, skips if no latest tag exists, pushes fresh if the repo is empty.

inputs:
  ecr_url:
    required: true
    description: ECR repository URL
  platform:
    required: false
    default: linux/amd64
    description: Target platform architecture for the placeholder image (e.g. linux/amd64, linux/arm64)

runs:
  using: composite
  steps:
    - name: Set up QEMU for cross-platform builds
      if: inputs.platform == 'linux/arm64'
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64

    - name: Push placeholder image
      shell: bash
      run: |
        ECR_URL="${{ inputs.ecr_url }}"
        REPO_NAME="${ECR_URL##*/}"

        LATEST_IMAGE=$(aws ecr list-images \
          --repository-name "$REPO_NAME" \
          --region us-east-1 \
          --query 'imageIds[?imageTag==`latest`]' \
          --output json)

        if [ "$LATEST_IMAGE" != "[]" ]; then
          echo "Found existing latest tag in $REPO_NAME — deleting before re-push."
          aws ecr batch-delete-image \
            --repository-name "$REPO_NAME" \
            --region us-east-1 \
            --image-ids imageTag=latest
        else
          EXISTING_IMAGES=$(aws ecr list-images \
            --repository-name "$REPO_NAME" \
            --region us-east-1 \
            --query 'imageIds[*]' \
            --output json)

          if [ "$EXISTING_IMAGES" != "[]" ]; then
            echo "Repository $REPO_NAME has images but no latest tag — skipping."
            exit 0
          fi

          echo "Repository $REPO_NAME is empty — pushing placeholder image."
        fi

        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin "${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"
        docker pull --platform ${{ inputs.platform }} public.ecr.aws/docker/library/python:3.13-slim
        docker tag public.ecr.aws/docker/library/python:3.13-slim "${ECR_URL}:latest"
        docker push "${ECR_URL}:latest"
