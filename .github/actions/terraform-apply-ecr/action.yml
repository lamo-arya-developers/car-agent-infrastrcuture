name: Terraform Apply ECR
description: Deploys ECR repositories and outputs their URLs

inputs:
  environment:
    required: true
    description: Environment name
  google_client_id:
    required: true
    description: Google OAuth client ID
  google_client_secret:
    required: true
    description: Google OAuth client secret

outputs:
  ecr_orchestrator_lambda_url:
    description: Orchestrator Lambda ECR URL
    value: ${{ steps.apply.outputs.ecr_orchestrator_lambda_url }}
  ecr_auth_lambda_url:
    description: Auth Lambda ECR URL
    value: ${{ steps.apply.outputs.ecr_auth_lambda_url }}
  ecr_agentcore_url:
    description: AgentCore ECR URL
    value: ${{ steps.apply.outputs.ecr_agentcore_url }}
  ecr_deletion_lambda_url:
    description: Deletion Lambda ECR URL
    value: ${{ steps.apply.outputs.ecr_deletion_lambda_url }}
  ecr_stripe_lambda_url:
    description: Stripe Lambda ECR URL
    value: ${{ steps.apply.outputs.ecr_stripe_lambda_url }}

runs:
  using: composite
  steps:
    - name: Apply ECR modules
      id: apply
      shell: bash
      env:
          TF_VAR_google_client_id: ${{ inputs.google_client_id }}
          TF_VAR_google_client_secret: ${{ inputs.google_client_secret }}
          # TF_VAR_facebook_app_id: ${{ secrets.FACEBOOK_APP_ID }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
          # TF_VAR_facebook_app_secret: ${{ secrets.FACEBOOK_APP_SECRET }} --- NOT NECESSARY FOR MVP, COMMENTING OUT FOR NOW ---
      run: |
        terraform apply -auto-approve \
          -target=module.ecr_orchestrator_lambda \
          -target=module.ecr_auth_lambda \
          -target=module.ecr_agentcore \
          -target=module.ecr_deletion_lambda \
          -target=module.ecr_stripe_lambda \
          -var-file="${{ inputs.environment }}.tfvars"
        echo "ecr_orchestrator_lambda_url=$(terraform output -raw ecr_orchestrator_lambda_url)" >> $GITHUB_OUTPUT
        echo "ecr_auth_lambda_url=$(terraform output -raw ecr_auth_lambda_url)" >> $GITHUB_OUTPUT
        echo "ecr_agentcore_url=$(terraform output -raw ecr_agentcore_url)" >> $GITHUB_OUTPUT
        echo "ecr_deletion_lambda_url=$(terraform output -raw ecr_deletion_lambda_url)" >> $GITHUB_OUTPUT
        echo "ecr_stripe_lambda_url=$(terraform output -raw ecr_stripe_lambda_url)" >> $GITHUB_OUTPUT