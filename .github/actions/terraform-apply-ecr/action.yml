name: Terraform Apply ECR
description: Deploys ECR repositories and outputs their URLs

inputs:
  environment:
    required: true
    description: Environment name

outputs:
  ecr_orchestrator_lambda_url:
    description: Orchestrator Lambda ECR URL
    value: ${{ steps.apply.outputs.ecr_orchestrator_lambda_url }}
  ecr_auth_lambda_url:
    description: Auth Lambda ECR URL
    value: ${{ steps.apply.outputs.ecr_auth_lambda_url }}
  ecr_agentcore_url:
    description: AgentCore ECR URL
    value: ${{ steps.apply.outputs.ecr_agentcore_url }}

runs:
  using: composite
  steps:
    - name: Apply ECR modules
      id: apply
      shell: bash
      run: |
        terraform apply -auto-approve \
          -target=module.ecr_orchestrator_lambda \
          -target=module.ecr_auth_lambda \
          -target=module.ecr_agentcore \
          -var-file="${{ inputs.environment }}.tfvars"
        echo "ecr_orchestrator_lambda_url=$(terraform output -raw ecr_orchestrator_lambda_url)" >> $GITHUB_OUTPUT
        echo "ecr_auth_lambda_url=$(terraform output -raw ecr_auth_lambda_url)" >> $GITHUB_OUTPUT
        echo "ecr_agentcore_url=$(terraform output -raw ecr_agentcore_url)" >> $GITHUB_OUTPUT