
name: Deploy Frontend
description: Builds the Vite/React app and syncs the dist/ output to S3, then invalidates the CloudFront cache so users get the new version immediately.

inputs:
  s3_bucket_name:
    required: true
    description: Name of the S3 bucket to sync the dist/ build into
  cloudfront_distribution_id:
    required: true
    description: CloudFront distribution ID to invalidate after the S3 sync
  frontend_dir:
    required: false
    default: frontend
    description: Path to the Vite project root relative to the repo root (default is frontend/)

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: ${{ inputs.frontend_dir }}/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.frontend_dir }}
      run: npm ci

    - name: Build
      shell: bash
      working-directory: ${{ inputs.frontend_dir }}
      run: npm run build

    - name: Sync dist/ to S3
      shell: bash
      run: |
        aws s3 sync ${{ inputs.frontend_dir }}/dist/ s3://${{ inputs.s3_bucket_name }} \
          --delete \
          --cache-control "public, max-age=31536000, immutable"

    - name: Set index.html cache to no-cache
      shell: bash
      # index.html must never be cached — it's the entry point that references
      # the hashed JS/CSS assets. If cached, users won't pick up new deployments.
      run: |
        aws s3 cp s3://${{ inputs.s3_bucket_name }}/index.html \
          s3://${{ inputs.s3_bucket_name }}/index.html \
          --metadata-directive REPLACE \
          --cache-control "no-cache, no-store, must-revalidate" \
          --content-type "text/html"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ inputs.cloudfront_distribution_id }} \
          --paths "/*"
